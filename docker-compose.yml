version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: swipehire-postgres
    environment:
      POSTGRES_USER: swipehire
      POSTGRES_PASSWORD: swipehire
      POSTGRES_DB: swipehire
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/init/00-extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U swipehire']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: swipehire-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  ml-sidecar:
    build:
      context: ./apps/ml-sidecar
      dockerfile: Dockerfile
    container_name: swipehire-ml
    ports:
      - '8001:8001'
    environment:
      MODEL_NAME: BAAI/bge-large-en-v1.5
      USE_QUANTIZATION: 'true'
      LOG_LEVEL: info
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # model load takes time on cold start

  mailhog:
    image: mailhog/mailhog
    container_name: swipehire-mailhog
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # web UI

volumes:
  postgres_data:
  redis_data:
  ml_models:
