# Railway / Nixpacks build config for SwipeHire monorepo.
#
# Railway runs this for both the api and worker services (same repo,
# different start commands set in the Railway UI).
#
# Why pin Node 22? Required by --env-file (used in dev) and aligned with
# package.json "engines": { "node": ">=22.0.0" }.

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm-9_x"]

# Both build and runtime — keep Playwright browsers inside /app so they
# survive the nixpacks build → runtime image copy. (Default ~/.cache/ms-playwright
# lives at /root/.cache which is NOT preserved into the runtime image.)
[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.cache/ms-playwright"

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile"
]

[phases.build]
# We don't compile to dist — the api/worker start scripts use tsx in prod.
# This phase installs the Chromium binaries that Playwright needs at runtime
# (HTML→PDF resume rendering on api, and liveness checks on worker).
#
# Playwright 1.49+ uses chromium_headless_shell as the default for
# chromium.launch() — the regular chromium binary alone isn't enough, so we
# install BOTH. --with-deps pulls in glibc/font deps on the build image.
cmds = [
  "pnpm exec playwright install --with-deps chromium chromium-headless-shell"
]

[start]
# Override per service in the Railway UI:
#   api    →  pnpm --filter @swipehire/api start
#   worker →  pnpm --filter @swipehire/worker start
cmd = "pnpm --filter @swipehire/api start"
